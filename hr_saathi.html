<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HR Saathi — TechCorp India</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap');

  * { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --primary: #2563EB;
    --primary-light: #EFF6FF;
    --primary-dark: #1D4ED8;
    --accent: #10B981;
    --danger: #EF4444;
    --bg: #F8FAFC;
    --surface: #FFFFFF;
    --border: #E2E8F0;
    --text: #0F172A;
    --text-secondary: #64748B;
    --bot-bg: #F1F5F9;
    --user-bg: #2563EB;
  }

  body {
    font-family: 'Plus Jakarta Sans', sans-serif;
    background: var(--bg);
    height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  .header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 14px 20px;
    display: flex;
    align-items: center;
    gap: 12px;
    flex-shrink: 0;
    box-shadow: 0 1px 8px rgba(0,0,0,0.06);
  }
  .avatar {
    width: 44px; height: 44px;
    background: linear-gradient(135deg, #2563EB, #10B981);
    border-radius: 12px;
    display: flex; align-items: center; justify-content: center;
    font-size: 20px; flex-shrink: 0;
  }
  .header-info { flex: 1; }
  .header-name { font-size: 15px; font-weight: 700; color: var(--text); }
  .header-sub { font-size: 12px; color: var(--text-secondary); margin-top: 1px; }
  .status-dot { width: 8px; height: 8px; background: var(--accent); border-radius: 50%; display: inline-block; margin-right: 5px; animation: pulse 2s infinite; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.5} }

  .voice-toggle {
    display: flex; align-items: center; gap: 6px;
    font-size: 12px; color: var(--text-secondary);
  }
  .toggle-switch { position: relative; width: 36px; height: 20px; }
  .toggle-switch input { display: none; }
  .toggle-slider {
    position: absolute; inset: 0;
    background: var(--border); border-radius: 99px; cursor: pointer; transition: 0.2s;
  }
  .toggle-slider:before {
    content: ''; position: absolute;
    width: 14px; height: 14px; left: 3px; top: 3px;
    background: white; border-radius: 50%; transition: 0.2s;
  }
  input:checked + .toggle-slider { background: var(--accent); }
  input:checked + .toggle-slider:before { transform: translateX(16px); }

  .messages {
    flex: 1; overflow-y: auto;
    padding: 20px; display: flex; flex-direction: column;
    gap: 14px; scroll-behavior: smooth;
  }
  .messages::-webkit-scrollbar { width: 4px; }
  .messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  .msg { display: flex; gap: 10px; max-width: 78%; animation: fadeIn 0.3s ease; }
  @keyframes fadeIn { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:translateY(0)} }
  .msg.bot { align-self: flex-start; }
  .msg.user { align-self: flex-end; flex-direction: row-reverse; }

  .msg-avatar {
    width: 34px; height: 34px; border-radius: 10px;
    display: flex; align-items: center; justify-content: center;
    font-size: 15px; flex-shrink: 0; margin-top: 2px;
  }
  .msg.bot .msg-avatar { background: linear-gradient(135deg, #2563EB, #10B981); }
  .msg.user .msg-avatar { background: #E2E8F0; }

  .msg-bubble {
    padding: 11px 15px; border-radius: 16px;
    font-size: 14px; line-height: 1.65;
    white-space: pre-wrap; word-break: break-word;
  }
  .msg.bot .msg-bubble { background: var(--bot-bg); color: var(--text); border-bottom-left-radius: 4px; }
  .msg.user .msg-bubble { background: var(--user-bg); color: white; border-bottom-right-radius: 4px; }
  .msg-time { font-size: 10px; color: var(--text-secondary); margin-top: 4px; }
  .msg.user .msg-time { text-align: right; }

  .typing { display: none; align-self: flex-start; padding-left: 44px; }
  .typing.show { display: flex; }
  .typing-bubble {
    background: var(--bot-bg); padding: 13px 16px;
    border-radius: 16px; border-bottom-left-radius: 4px;
    display: flex; gap: 5px; align-items: center;
  }
  .dot { width: 7px; height: 7px; background: #94A3B8; border-radius: 50%; animation: bounce 1.2s infinite; }
  .dot:nth-child(2) { animation-delay: 0.2s; }
  .dot:nth-child(3) { animation-delay: 0.4s; }
  @keyframes bounce { 0%,60%,100%{transform:translateY(0)} 30%{transform:translateY(-6px)} }

  .quick-replies {
    padding: 0 20px 12px; display: flex;
    gap: 8px; flex-wrap: wrap; flex-shrink: 0;
  }
  .quick-btn {
    padding: 7px 13px; background: var(--primary-light);
    color: var(--primary); border: 1px solid #BFDBFE;
    border-radius: 99px; font-size: 12px; font-weight: 500;
    cursor: pointer; font-family: inherit; transition: all 0.15s; white-space: nowrap;
  }
  .quick-btn:hover { background: var(--primary); color: white; border-color: var(--primary); }

  .input-area {
    background: var(--surface); border-top: 1px solid var(--border);
    padding: 12px 20px; display: flex; gap: 8px;
    align-items: flex-end; flex-shrink: 0;
  }
  textarea {
    flex: 1; padding: 10px 14px;
    border: 1.5px solid var(--border); border-radius: 12px;
    font-size: 14px; font-family: inherit; resize: none;
    outline: none; max-height: 100px; line-height: 1.5;
    background: var(--bg); color: var(--text); transition: border-color 0.2s;
  }
  textarea:focus { border-color: var(--primary); background: white; }
  textarea::placeholder { color: var(--text-secondary); }

  .mic-btn {
    width: 44px; height: 44px; background: var(--surface);
    border: 1.5px solid var(--border); border-radius: 12px;
    cursor: pointer; display: flex; align-items: center;
    justify-content: center; flex-shrink: 0;
    transition: all 0.15s; font-size: 18px;
  }
  .mic-btn:hover { border-color: var(--primary); background: var(--primary-light); }
  .mic-btn.listening {
    background: var(--danger); border-color: var(--danger);
    animation: micPulse 1s infinite;
  }
  @keyframes micPulse {
    0%,100% { box-shadow: 0 0 0 0 rgba(239,68,68,0.4); }
    50% { box-shadow: 0 0 0 8px rgba(239,68,68,0); }
  }

  .send-btn {
    width: 44px; height: 44px; background: var(--primary);
    border: none; border-radius: 12px; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0; transition: all 0.15s;
  }
  .send-btn:hover { background: var(--primary-dark); transform: scale(1.05); }
  .send-btn:disabled { background: var(--border); cursor: not-allowed; transform: none; }
  .send-btn svg { width: 18px; height: 18px; fill: white; }

  .status-bar {
    text-align: center; font-size: 12px;
    color: var(--text-secondary); padding: 4px 0 0; min-height: 20px; flex-shrink: 0;
  }
  .status-bar.listening { color: var(--danger); font-weight: 500; }
  .status-bar.speaking { color: var(--accent); font-weight: 500; }

  .welcome { text-align: center; padding: 30px 20px; color: var(--text-secondary); }
  .welcome-icon { font-size: 52px; margin-bottom: 14px; }
  .welcome-title { font-size: 20px; font-weight: 700; color: var(--text); margin-bottom: 8px; }
  .welcome-sub { font-size: 13px; line-height: 1.7; max-width: 320px; margin: 0 auto; }
</style>
</head>
<body>

<div class="header">
  <div class="avatar">🤝</div>
  <div class="header-info">
    <div class="header-name">HR Saathi</div>
    <div class="header-sub"><span class="status-dot"></span>TechCorp India • Online</div>
  </div>
  <div class="voice-toggle">
    🔊
    <label class="toggle-switch">
      <input type="checkbox" id="tts-toggle" checked>
      <span class="toggle-slider"></span>
    </label>
    <span style="font-size:11px;">Auto speak</span>
  </div>
</div>

<div class="messages" id="messages">
  <div class="welcome">
    <div class="welcome-icon">🎙️</div>
    <div class="welcome-title">Namaste! Main HR Saathi hoon</div>
    <div class="welcome-sub">
      Type karo ya 🎤 mic button dabao aur bolo!<br><br>
      Leaves, WFH, salary, policies — sab ke baare mein poochho.<br><br>
      <strong>Pehle terminal mein chalao:</strong><br>
      <code style="background:#F1F5F9;padding:4px 8px;border-radius:6px;font-size:12px;">python server.py</code>
    </div>
  </div>
</div>

<div class="typing" id="typing">
  <div class="typing-bubble">
    <div class="dot"></div><div class="dot"></div><div class="dot"></div>
  </div>
</div>

<div class="status-bar" id="status-bar"></div>

<div class="quick-replies" id="quick-replies">
  <button class="quick-btn" onclick="sendQuick('Leave balance kaise check karein?')">🗓️ Leave balance</button>
  <button class="quick-btn" onclick="sendQuick('WFH policy kya hai?')">🏠 WFH policy</button>
  <button class="quick-btn" onclick="sendQuick('Salary slip kahan milegi?')">💰 Salary slip</button>
  <button class="quick-btn" onclick="sendQuick('Notice period kitna hai?')">📋 Notice period</button>
  <button class="quick-btn" onclick="sendQuick('Maternity leave kitni milti hai?')">👶 Maternity leave</button>
</div>

<div class="input-area">
  <textarea id="user-input" rows="1"
    placeholder="Type karo ya 🎤 dabao aur bolo... (Enter = send)"
    onkeydown="handleKey(event)"
    oninput="autoResize(this)"></textarea>
  <button class="mic-btn" id="mic-btn" onclick="toggleMic()" title="Mic — click karke bolo">🎤</button>
  <button class="send-btn" id="send-btn" onclick="sendMessage()">
    <svg viewBox="0 0 24 24"><path d="M2 21l21-9L2 3v7l15 2-15 2v7z"/></svg>
  </button>
</div>

<script>
const SERVER_URL = 'https://hr-saathi.onrender.com/chat';
let messages = [];
let recognition = null;
let isListening = false;

// ── SPEECH RECOGNITION ───────────────────────────────
function setupSpeech() {
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!SR) {
    document.getElementById('mic-btn').title = 'Chrome browser use karo voice ke liye';
    return;
  }
  recognition = new SR();
  recognition.lang = 'hi-IN';
  recognition.interimResults = true;
  recognition.continuous = false;

  recognition.onstart = () => {
    isListening = true;
    document.getElementById('mic-btn').classList.add('listening');
    document.getElementById('mic-btn').textContent = '⏹';
    setStatus('🎤 Sun raha hoon... bolte rahiye', 'listening');
  };

  recognition.onresult = (e) => {
    const transcript = Array.from(e.results).map(r => r[0].transcript).join('');
    document.getElementById('user-input').value = transcript;
    autoResize(document.getElementById('user-input'));
    if (e.results[e.results.length - 1].isFinal) {
      setTimeout(() => sendMessage(), 400);
    }
  };

  recognition.onerror = (e) => {
    stopListening();
    if (e.error === 'not-allowed') setStatus('❌ Mic permission do browser settings mein', '');
    else setStatus('❌ Voice error — dobara try karo', '');
  };

  recognition.onend = () => stopListening();
}

function toggleMic() {
  if (!recognition) { alert('Voice ke liye Chrome browser use karo!'); return; }
  if (isListening) { recognition.stop(); return; }
  window.speechSynthesis.cancel();
  try { recognition.start(); }
  catch(e) { setStatus('❌ Mic start nahi hua — dobara click karo', ''); }
}

function stopListening() {
  isListening = false;
  document.getElementById('mic-btn').classList.remove('listening');
  document.getElementById('mic-btn').textContent = '🎤';
  setStatus('', '');
}

// ── TEXT TO SPEECH ──────────────────────────────────
function speak(text) {
  if (!document.getElementById('tts-toggle').checked) return;
  if (!window.speechSynthesis) return;

  const clean = text
    .replace(/[\u{1F300}-\u{1FFFF}]/gu, '')
    .replace(/[✅❌🔒📧👤⚠️💰🗓️🏠📋👶🎤🔊]/g, '')
    .replace(/\S+\.\S+\.\S+/g, '')
    .trim();

  window.speechSynthesis.cancel();
  const u = new SpeechSynthesisUtterance(clean);
  u.lang = 'hi-IN';
  u.rate = 1.05;
  u.onstart = () => setStatus('🔊 Bol raha hoon...', 'speaking');
  u.onend = () => setStatus('', '');
  window.speechSynthesis.speak(u);
}

// ── CHAT ─────────────────────────────────────────────
function addMessage(role, text) {
  const msgs = document.getElementById('messages');
  const welcome = msgs.querySelector('.welcome');
  if (welcome) welcome.remove();

  const time = new Date().toLocaleTimeString('en-IN', { hour: '2-digit', minute: '2-digit' });
  const div = document.createElement('div');
  div.className = `msg ${role}`;
  div.innerHTML = `
    <div class="msg-avatar">${role === 'bot' ? '🤝' : '👤'}</div>
    <div>
      <div class="msg-bubble">${text}</div>
      <div class="msg-time">${time}</div>
    </div>`;
  msgs.appendChild(div);
  msgs.scrollTop = msgs.scrollHeight;
  if (role === 'user') document.getElementById('quick-replies').style.display = 'none';
}

function showTyping(show) {
  document.getElementById('typing').classList.toggle('show', show);
  if (show) document.getElementById('messages').scrollTop = 99999;
}

function setStatus(text, type) {
  const bar = document.getElementById('status-bar');
  bar.textContent = text;
  bar.className = 'status-bar' + (type ? ` ${type}` : '');
}

async function sendMessage() {
  const input = document.getElementById('user-input');
  const text = input.value.trim();
  if (!text) return;
  if (isListening) recognition.stop();

  input.value = '';
  autoResize(input);
  addMessage('user', text);
  document.getElementById('send-btn').disabled = true;
  showTyping(true);
  setStatus('', '');

  messages.push({ role: 'user', content: text });

  try {
    const res = await fetch(SERVER_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ messages })
    });
    if (!res.ok) throw new Error('Server error ' + res.status);
    const data = await res.json();
    if (data.error) throw new Error(data.error);

    const reply = data.reply;
    messages.push({ role: 'assistant', content: reply });
    showTyping(false);
    addMessage('bot', reply);
    speak(reply);

  } catch (e) {
    showTyping(false);
    addMessage('bot', '⚠️ Server se connect nahi ho pa raha!\n\nTerminal mein chalao:\npython server.py\n\nPhir yeh page refresh karo.');
  }

  document.getElementById('send-btn').disabled = false;
  input.focus();
}

function sendQuick(text) {
  document.getElementById('user-input').value = text;
  sendMessage();
}

function handleKey(e) {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
}

function autoResize(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 100) + 'px';
}

setupSpeech();
</script>
</body>
</html>
